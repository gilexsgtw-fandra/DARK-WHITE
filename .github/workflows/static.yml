</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-change-pw" id="changePwModal">
    <div class="modal-card-pw">
        <h2>CHANGE PASSWORD</h2>
        <div class="sub">SECURITY UPDATE</div>
        <div class="sub" style="margin-top: -12px; margin-bottom: 20px;">Masukkan password lama dan baru.</div>
        <div class="modal-input-group">
            <label>Old Password</label>
            <div class="modal-input-wrapper">
                <input type="password" id="oldPasswordInput" placeholder="Enter old password">
            </div>
        </div>
        <div class="modal-input-group">
            <label>New Password</label>
            <div class="modal-input-wrapper">
                <input type="password" id="newPasswordInput" placeholder="Enter new password">
            </div>
        </div>
        <div class="modal-input-group">
            <label>Confirm Password</label>
            <div class="modal-input-wrapper">
                <input type="password" id="confirmPasswordInput" placeholder="Confirm new password">
            </div>
        </div>
        <button class="modal-btn" id="updatePwBtn">UPDATE PASSWORD</button>
        <button class="modal-cancel" id="cancelPwModalBtn">Cancel</button>
    </div>
</div>

<script>
(function() {
    function refreshIcons() { if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); }
    refreshIcons();

    const loginPage = document.getElementById('loginPage');
    const splashScreen = document.getElementById('splashScreen');
    const appWrapper = document.getElementById('appWrapper');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const usernameCounter = document.getElementById('usernameCounter');
    const passwordCounter = document.getElementById('passwordCounter');
    const loginBtn = document.getElementById('loginBtn');
    const buyLink = document.getElementById('buyLink');
    const sidebarUsername = document.getElementById('sidebarUsername');
    const waUsername = document.getElementById('waUsername');
    const bellIcon = document.getElementById('bellIcon');
    const manageSenderBtn = document.getElementById('manageSenderBtn');
    const channelWhatsappBtn = document.getElementById('channelWhatsappBtn');
    const senderModal = document.getElementById('senderModal');
    const backSenderBtn = document.getElementById('backSenderBtn');
    const profileIcon = document.getElementById('profileIcon');
    const profileMenuBtn = document.getElementById('profileMenuBtn');
    const profilePageModal = document.getElementById('profilePageModal');
    const backProfileBtn = document.getElementById('backProfileBtn');
    const changePasswordPageBtn = document.getElementById('changePasswordPageBtn');
    const changePwModal = document.getElementById('changePwModal');
    const cancelPwModalBtn = document.getElementById('cancelPwModalBtn');
    const updatePwBtn = document.getElementById('updatePwBtn');
    const oldPasswordInput = document.getElementById('oldPasswordInput');
    const newPasswordInput = document.getElementById('newPasswordInput');
    const confirmPasswordInput = document.getElementById('confirmPasswordInput');
    const profileNameDisplay = document.getElementById('profileNameDisplay');
    const profileRoleDisplay = document.getElementById('profileRoleDisplay');
    const profileUsernameDisplay = document.getElementById('profileUsernameDisplay');
    const profilePasswordDisplay = document.getElementById('profilePasswordDisplay');
    const profileRoleValueDisplay = document.getElementById('profileRoleValueDisplay');
    const profileExpiryDisplay = document.getElementById('profileExpiryDisplay');
    
    const splashVideo = document.getElementById('splashVideo');
    const progressFill = document.getElementById('progressFill');
    const skipBtn = document.getElementById('skipBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentUsername = "";
    let currentPassword = "";
    let splashTimeoutId = null;
    let splashAnimationFrame = null;
    
    const navHome = document.getElementById('navHome');
    const navWhatsApp = document.getElementById('navWhatsApp');
    const navInfo = document.getElementById('navInfo');
    const navTools = document.getElementById('navTools');
    const pageHome = document.getElementById('pageHome');
    const pageWhatsApp = document.getElementById('pageWhatsApp');
    const pageInfo = document.getElementById('pageInfo');
    const pageTools = document.getElementById('pageTools');

    // SENDER NODES VARIABLES
    let activeNodes = [];
    let generatedCode = '';
    let pendingPhoneNumber = '';

    function setActivePage(page) {
        pageHome.classList.remove('active-page');
        pageWhatsApp.classList.remove('active-page');
        pageInfo.classList.remove('active-page');
        pageTools.classList.remove('active-page');
        navHome.classList.remove('active');
        navWhatsApp.classList.remove('active');
        navInfo.classList.remove('active');
        navTools.classList.remove('active');
        if (page === 'home') { pageHome.classList.add('active-page'); navHome.classList.add('active'); }
        else if (page === 'whatsapp') { pageWhatsApp.classList.add('active-page'); navWhatsApp.classList.add('active'); }
        else if (page === 'info') { pageInfo.classList.add('active-page'); navInfo.classList.add('active'); }
        else if (page === 'tools') { pageTools.classList.add('active-page'); navTools.classList.add('active'); }
    }
    
    navHome.onclick = () => setActivePage('home');
    navWhatsApp.onclick = () => setActivePage('whatsapp');
    navInfo.onclick = () => setActivePage('info');
    navTools.onclick = () => setActivePage('tools');
    
    window.toggleMenu = function() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        if (sb && ov) {
            sb.classList.toggle('active');
            ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
        }
    };
    
    function showToast(msg, isSuccess = false) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast' + (isSuccess ? ' success' : '');
        t.innerText = msg;
        c.appendChild(t);
        setTimeout(() => { if (t && t.remove) t.remove(); }, 2000);
    }
    
    if (bellIcon) bellIcon.onclick = () => showToast('🔔 Tidak ada notifikasi baru');
    
    function updateUsernameCounter() {
        const len = loginUsername.value.length;
        usernameCounter.innerText = len + '/8';
        if (len > 0 && len <= 8) usernameCounter.classList.add('valid');
        else usernameCounter.classList.remove('valid');
        validateLoginBtn();
    }
    function updatePasswordCounter() {
        const len = loginPassword.value.length;
        passwordCounter.innerText = len + '/8';
        if (len > 0 && len <= 8) passwordCounter.classList.add('valid');
        else passwordCounter.classList.remove('valid');
        validateLoginBtn();
    }
    function validateLoginBtn() {
        const valid = loginUsername.value.length > 0 && loginUsername.value.length <= 8 && 
                      loginPassword.value.length > 0 && loginPassword.value.length <= 8;
        loginBtn.disabled = !valid;
        if (valid) loginBtn.classList.remove('disabled');
        else loginBtn.classList.add('disabled');
    }
    loginUsername.addEventListener('input', function() { 
        if (this.value.length > 8) this.value = this.value.slice(0,8); 
        updateUsernameCounter(); 
    });
    loginPassword.addEventListener('input', function() { 
        if (this.value.length > 8) this.value = this.value.slice(0,8); 
        updatePasswordCounter(); 
    });
    
    // PROFILE ICON CLICK (atas kanan)
    if (profileIcon) {
        profileIcon.onclick = () => {
            if (currentUsername) {
                profileNameDisplay.innerText = currentUsername.toUpperCase();
                profileUsernameDisplay.innerText = currentUsername;
                profilePasswordDisplay.innerText = '*'.repeat(currentPassword.length);
            }
            profilePageModal.classList.add('show');
            refreshIcons();
        };
    }
    
    // PROFILE MENU CLICK (di sidebar)
    if (profileMenuBtn) {
        profileMenuBtn.onclick = () => {
            if (currentUsername) {
                profileNameDisplay.innerText = currentUsername.toUpperCase();
                profileUsernameDisplay.innerText = currentUsername;
                profilePasswordDisplay.innerText = '*'.repeat(currentPassword.length);
            }
            profilePageModal.classList.add('show');
            toggleMenu();
            refreshIcons();
        };
    }
    
    // BACK BUTTON PROFILE
    if (backProfileBtn) {
        backProfileBtn.onclick = () => {
            profilePageModal.classList.remove('show');
        };
    }
    
    // CLICK OUTSIDE PROFILE MODAL
    profilePageModal.onclick = (e) => {
        if (e.target === profilePageModal) {
            profilePageModal.classList.remove('show');
        }
    };
    
    // CHANGE PASSWORD BUTTON IN PROFILE
    if (changePasswordPageBtn) {
        changePasswordPageBtn.onclick = () => {
            changePwModal.classList.add('show');
            oldPasswordInput.value = '';
            newPasswordInput.value = '';
            confirmPasswordInput.value = '';
            refreshIcons();
        };
    }
    
    // CANCEL PASSWORD MODAL
    if (cancelPwModalBtn) {
        cancelPwModalBtn.onclick = () => {
            changePwModal.classList.remove('show');
        };
    }
    
    // CLICK OUTSIDE PASSWORD MODAL
    changePwModal.onclick = (e) => {
        if (e.target === changePwModal) {
            changePwModal.classList.remove('show');
        }
    };
    
    // UPDATE PASSWORD
    if (updatePwBtn) {
        updatePwBtn.onclick = () => {
            const oldPass = oldPasswordInput.value.trim();
            const newPass = newPasswordInput.value.trim();
            const confirmPass = confirmPasswordInput.value.trim();
            
            if (oldPass === '') { showToast('❌ Masukkan password lama!'); return; }
            if (oldPass !== currentPassword) { showToast('❌ Password lama salah!'); return; }
            if (newPass === '') { showToast('❌ Masukkan password baru!'); return; }
            if (newPass !== confirmPass) { showToast('❌ Password baru tidak cocok!'); return; }
            if (newPass.length > 8) { showToast('❌ Password maksimal 8 karakter!'); return; }
            
            currentPassword = newPass;
            showToast('✅ Password berhasil diubah!', true);
            changePwModal.classList.remove('show');
            if (profilePasswordDisplay) profilePasswordDisplay.innerText = '*'.repeat(newPass.length);
        };
    }
    
    const sendBugBtn = document.getElementById('sendBugBtn');
    if (sendBugBtn) {
        sendBugBtn.addEventListener('click', () => {
            const num = document.getElementById('targetNumber')?.value.trim();
            const bug = document.getElementById('bugSelect')?.value;
            if (!num) { showToast('❌ ISI NOMOR TARGET!'); return; }
            if (!num.startsWith('+')) { showToast('❌ GUNAKAN FORMAT +62'); return; }
            if (!bug) { showToast('❌ PILIH BUG!'); return; }
            showToast(`✅ Bug ${bug} terkirim ke ${num}`, true);
            const sm = document.getElementById('successMsg');
            if (sm) { sm.innerText = `✅ Berhasil mengirim bug ${bug} ke ${num}.`; sm.style.display = 'block'; setTimeout(() => sm.style.display = 'none', 5000); }
        });
    }
    
    const devPageBtn = document.getElementById('devPageBtn');
    if (devPageBtn) devPageBtn.onclick = () => { showToast('LU BUKAN ADMIN/OWNER KOCAK😹'); toggleMenu(); };
    
    // CHANNEL WHATSAPP BUTTON - BUKA LINK WHATSAPP CHANNEL
    if (channelWhatsappBtn) {
        channelWhatsappBtn.onclick = () => {
            window.open('https://whatsapp.com/channel/0029Vb6zqwKBA1ewSBGNy90O', '_blank');
        };
    }
    
    // SENDER NODES FUNCTIONS
    function formatPhoneNumber(phone) {
        let cleaned = phone.trim();
        if (!cleaned.startsWith('+')) {
            if (cleaned.startsWith('0')) {
                cleaned = '+62' + cleaned.substring(1);
            } else if (!cleaned.startsWith('62')) {
                cleaned = '+62' + cleaned;
            } else {
                cleaned = '+' + cleaned;
            }
        }
        return cleaned;
    }

    function generateRandomCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function renderNodesList() {
        const container = document.getElementById('nodeListContainer');
        if (!container) return;
        
        if (activeNodes.length === 0) {
            showAllSenderStates();
            return;
        }

        container.innerHTML = '';
        activeNodes.forEach((node) => {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node-item';
            nodeDiv.innerHTML = `
                <div class="node-info">
                    <div class="node-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b9eff" stroke-width="1.5">
                            <path d="M21 11.5C21 16.1944 17.1944 20 12.5 20C10.8 20 9.2 19.5 7.9 18.6L3 20L4.5 15.3C3.5 13.9 3 12.2 3 10.5C3 5.80558 6.80558 2 11.5 2C16.1944 2 21 5.80558 21 11.5Z" stroke="currentColor" fill="none"/>
                            </svg>
                    </div>
                    <div class="node-details">
                        <h4>${node.phone}</h4>
                        <p>Connected: ${node.date}</p>
                    </div>
                </div>
                <div class="node-status">● ACTIVE</div>
            `;
            container.appendChild(nodeDiv);
        });
    }

    function showAllSenderStates() {
        document.getElementById('emptyStateSender').classList.remove('hidden');
        document.getElementById('formStateSender').classList.add('hidden');
        document.getElementById('pairingStateSender').classList.add('hidden');
        document.getElementById('nodesStateSender').classList.add('hidden');
    }

    function showSenderForm() {
        document.getElementById('emptyStateSender').classList.add('hidden');
        document.getElementById('formStateSender').classList.remove('hidden');
        document.getElementById('pairingStateSender').classList.add('hidden');
        document.getElementById('nodesStateSender').classList.add('hidden');
        document.getElementById('phoneNumberSender').value = '';
    }

    function showSenderPairing(phone) {
        pendingPhoneNumber = phone;
        generatedCode = generateRandomCode();
        document.getElementById('codeDisplaySender').innerText = generatedCode;
        
        document.getElementById('emptyStateSender').classList.add('hidden');
        document.getElementById('formStateSender').classList.add('hidden');
        document.getElementById('pairingStateSender').classList.remove('hidden');
        document.getElementById('nodesStateSender').classList.add('hidden');
    }

    function showSenderNodes() {
        if (activeNodes.length === 0) {
            showAllSenderStates();
            return;
        }
        renderNodesList();
        document.getElementById('emptyStateSender').classList.add('hidden');
        document.getElementById('formStateSender').classList.add('hidden');
        document.getElementById('pairingStateSender').classList.add('hidden');
        document.getElementById('nodesStateSender').classList.remove('hidden');
    }

    function saveNodesToLocal() {
        localStorage.setItem('senderNodes', JSON.stringify(activeNodes));
    }

    // Open modal saat tombol Manage Sender diklik
    if (manageSenderBtn) {
        manageSenderBtn.onclick = () => {
            const saved = localStorage.getItem('senderNodes');
            if (saved) {
                try {
                    activeNodes = JSON.parse(saved);
                } catch(e) {}
            }
            if (activeNodes.length === 0) {
                showAllSenderStates();
            } else {
                showSenderNodes();
            }
            senderModal.classList.add('show');
            refreshIcons();
        };
    }
    
    // BACK BUTTON SENDER MODAL
    if (backSenderBtn) {
        backSenderBtn.onclick = () => {
            senderModal.classList.remove('show');
        };
    }

    // Close modal when clicking outside
    senderModal.onclick = (e) => {
        if (e.target === senderModal) {
            senderModal.classList.remove('show');
        }
    };

    // Sender Modal Event Listeners
    const showFormSenderBtn = document.getElementById('showFormSenderBtn');
    const cancelSenderBtn = document.getElementById('cancelSenderBtn');
    const generatePairingBtn = document.getElementById('generatePairingBtn');
    const finishPairingSenderBtn = document.getElementById('finishPairingSenderBtn');
    const addNewNodeSenderBtn = document.getElementById('addNewNodeSenderBtn');
    const copyCodeSenderBtn = document.getElementById('copyCodeSenderBtn');
    const phoneNumberSender = document.getElementById('phoneNumberSender');

    if (showFormSenderBtn) {
        showFormSenderBtn.onclick = () => showSenderForm();
    }
    if (cancelSenderBtn) {
        cancelSenderBtn.onclick = () => {
            if (activeNodes.length === 0) {
                showAllSenderStates();
            } else {
                showSenderNodes();
            }
        };
    }
    if (generatePairingBtn) {
        generatePairingBtn.onclick = () => {
            let phone = phoneNumberSender.value.trim();
            if (phone === '') {
                showToast('❌ Masukkan nomor WhatsApp terlebih dahulu!', true);
                return;
            }
            const formattedPhone = formatPhoneNumber(phone);
            showSenderPairing(formattedPhone);
        };
    }
    if (finishPairingSenderBtn) {
        finishPairingSenderBtn.onclick = () => {
            if (!pendingPhoneNumber) return;
            const now = new Date();
            const dateStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
            activeNodes.push({
                phone: pendingPhoneNumber,
                date: dateStr,
                code: generatedCode
            });
            pendingPhoneNumber = '';
            generatedCode = '';
            saveNodesToLocal();
            showToast(`✅ Sender node berhasil diinisialisasi!\nNomor: ${activeNodes[activeNodes.length-1].phone}`, false);
            setTimeout(() => {
                showToast(`📱 WhatsApp notification: Koneksi berhasil dipasangkan.`, false);
            }, 500);
            showSenderNodes();
        };
    }
    if (addNewNodeSenderBtn) {
        addNewNodeSenderBtn.onclick = () => showSenderForm();
    }
    if (copyCodeSenderBtn) {
        copyCodeSenderBtn.onclick = () => {
            navigator.clipboard.writeText(generatedCode).then(() => {
                showToast('✅ Kode pairing berhasil disalin!');
            }).catch(() => {
                showToast('⚠️ Gagal menyalin kode', true);
            });
        };
    }
    
    function finishSplashAndShowApp() {
        if (splashTimeoutId) clearTimeout(splashTimeoutId);
        if (splashAnimationFrame) cancelAnimationFrame(splashAnimationFrame);
        if (splashVideo) { 
            splashVideo.pause(); 
            splashVideo.currentTime = 0; 
        }
        splashScreen.classList.remove('show', 'glitch-exit');
        loginPage.style.display = 'none';
        appWrapper.classList.add('show');
        setActivePage('home');
        refreshIcons();
        
        const waVideoElem = document.getElementById('waVideo');
        if (waVideoElem) waVideoElem.play().catch(e => console.log('Video play error:', e));
    }
    
    function startSplash() {
        if (splashTimeoutId) clearTimeout(splashTimeoutId);
        if (splashAnimationFrame) cancelAnimationFrame(splashAnimationFrame);
        
        splashScreen.classList.remove('glitch-exit');
        splashScreen.classList.add('show');
        
        if (splashVideo) {
            splashVideo.muted = false;
            splashVideo.currentTime = 0;
            splashVideo.loop = true;
            splashVideo.play().catch(e => console.log('Video autoplay error:', e));
        }
        if (progressFill) progressFill.style.width = '0%';
        
        const duration = 7000;
        const start = Date.now();
        
        function updateProgressBar() {
            const elapsed = Date.now() - start;
            const percent = Math.min(100, (elapsed / duration) * 100);
            if (progressFill) progressFill.style.width = percent + '%';
            const statusSpan = document.getElementById('statusText');
            if (statusSpan) {
                if (elapsed < 2000) statusSpan.innerText = 'CONNECTING TO SERVER...';
                else if (elapsed < 4000) statusSpan.innerText = 'LOADING RESOURCES...';
                else if (elapsed < 6000) statusSpan.innerText = 'DECRYPTING MODULES...';
                else statusSpan.innerText = 'ALMOST READY...';
            }
            if (elapsed >= duration) {
                finishSplashAndShowApp();
                return;
            }
            splashAnimationFrame = requestAnimationFrame(updateProgressBar);
        }
        
        splashAnimationFrame = requestAnimationFrame(updateProgressBar);
        splashTimeoutId = setTimeout(finishSplashAndShowApp, duration + 200);
        
        if (muteBtn && splashVideo) {
            const newMute = muteBtn.cloneNode(true);
            muteBtn.parentNode.replaceChild(newMute, muteBtn);
            newMute.onclick = () => {
                splashVideo.muted = !splashVideo.muted;
                newMute.innerHTML = splashVideo.muted ? '<i data-lucide="volume-x"></i>' : '<i data-lucide="volume-2"></i>';
                refreshIcons();
            };
        }
        if (skipBtn && splashVideo) {
            const newSkip = skipBtn.cloneNode(true);
            skipBtn.parentNode.replaceChild(newSkip, skipBtn);
            newSkip.onclick = () => {
                if (splashTimeoutId) clearTimeout(splashTimeoutId);
                if (splashAnimationFrame) cancelAnimationFrame(splashAnimationFrame);
                finishSplashAndShowApp();
            };
        }
        refreshIcons();
    }
    
    function doLogout() {
        splashScreen.classList.add('show', 'glitch-exit');
        if (splashVideo) { 
            splashVideo.muted = false; 
            splashVideo.currentTime = 0; 
            splashVideo.play().catch(e => console.log(e)); 
        }
        setTimeout(() => {
            splashScreen.classList.remove('show', 'glitch-exit');
            if (splashVideo) splashVideo.pause();
            if (loginUsername) loginUsername.value = '';
            if (loginPassword) loginPassword.value = '';
            currentUsername = '';
            currentPassword = '';
            updateUsernameCounter();
            updatePasswordCounter();
            appWrapper.classList.remove('show');
            loginPage.style.display = 'flex';
            loginPage.classList.remove('hide');
            refreshIcons();
        }, 700);
    }
    
    function doLogin() {
        const user = loginUsername.value.trim();
        const pass = loginPassword.value.trim();
        if (!user || !pass) { showToast('❌ Isi username dan password!'); return; }
        if (user.length < 1 || user.length > 8) { showToast('❌ Username harus 1-8 karakter!'); return; }
        if (pass.length < 1 || pass.length > 8) { showToast('❌ Password harus 1-8 karakter!'); return; }
        
        currentUsername = user;
        currentPassword = pass;
        
        if (sidebarUsername) sidebarUsername.innerText = user;
        if (waUsername) waUsername.innerText = user;
        
        loginPage.classList.add('hide');
        startSplash();
    }
    
    if (loginBtn) loginBtn.onclick = doLogin;
    if (loginUsername) loginUsername.onkeypress = (e) => { if (e.key === 'Enter') doLogin(); };
    if (loginPassword) loginPassword.onkeypress = (e) => { if (e.key === 'Enter') doLogin(); };
    if (buyLink) buyLink.onclick = (e) => { e.preventDefault(); showToast('🔒 Halaman pembelian akan segera tersedia'); };
    
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.onclick = () => { doLogout(); toggleMenu(); };
    
    // DDoS Panel
    let selectedMethod = 'HTTP';
    let isAttacking = false;
    let attackInterval = null, timerInterval = null;
    let packetCount = 0, attackSeconds = 0, durationSeconds = 60;
    const targetInput = document.getElementById('targetInput');
    const portInput = document.getElementById('portInput');
    const threadsSlider = document.getElementById('threadsSlider');
    const threadsValue = document.getElementById('threadsValue');
    const durationSlider = document.getElementById('durationSlider');
    const attackBtn = document.getElementById('attackBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusValue = document.getElementById('statusValue');
    const packetsSentEl = document.getElementById('packetsSent');
    const attackTimeEl = document.getElementById('attackTime');
    const logContainer = document.getElementById('logContainer');
    
    function addLog(msg) {
        if (!logContainer) return;
        const div = document.createElement('div');
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logContainer.appendChild(div);
        logContainer.scrollTop = logContainer.scrollHeight;
        if (logContainer.children.length > 50) logContainer.removeChild(logContainer.children[0]);
    }
    function updateStats() { 
        if (packetsSentEl) packetsSentEl.innerText = packetCount.toLocaleString(); 
        if (attackTimeEl) attackTimeEl.innerText = attackSeconds + 's'; 
    }
    function simulatePacket() { 
        if (!isAttacking) return; 
        const threads = threadsSlider ? parseInt(threadsSlider.value) : 100; 
        packetCount += Math.floor(threads / 10) + 1; 
        updateStats(); 
    }
    function stopAttack() {
        if (attackInterval) clearInterval(attackInterval);
        if (timerInterval) clearInterval(timerInterval);
        isAttacking = false;
        if (statusValue) { statusValue.className = 'status-value idle'; statusValue.innerHTML = '● IDLE'; }
        if (attackBtn) attackBtn.disabled = false;
        addLog(`🛑 Attack stopped. Total packets: ${packetCount.toLocaleString()}`);
    }
    function startAttack() {
        const target = targetInput?.value.trim();
        const port = portInput?.value.trim();
        if (!target) { showToast('❌ Masukkan IP / Domain target!'); return; }
        if (!port) { showToast('❌ Masukkan port!'); return; }
        stopAttack();
        isAttacking = true;
        packetCount = 0;
        attackSeconds = 0;
        updateStats();
        if (statusValue) { statusValue.className = 'status-value attacking'; statusValue.innerHTML = '⚡ ATTACKING ⚡'; }
        if (attackBtn) attackBtn.disabled = true;
        addLog(`🚀 STARTING ${selectedMethod} ATTACK on ${target}:${port}`);
        addLog(`📊 Threads: ${threadsSlider?.value || 100} | Duration: ${durationSeconds}s`);
        attackInterval = setInterval(simulatePacket, 50);
        let remaining = durationSeconds;
        timerInterval = setInterval(() => {
            if (!isAttacking) return;
            attackSeconds++;
            updateStats();
            remaining--;
            if (remaining <= 0) { stopAttack(); addLog(`✅ Attack finished! Total packets: ${packetCount.toLocaleString()}`); showToast(`✅ Attack finished! ${packetCount.toLocaleString()} packets sent`, true); }
        }, 1000);
    }
    if (attackBtn) attackBtn.onclick = startAttack;
    if (stopBtn) stopBtn.onclick = stopAttack;
    
    const methodBadges = document.querySelectorAll('.method-badge');
    methodBadges.forEach(b => {
        b.onclick = () => {
            methodBadges.forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            selectedMethod = b.getAttribute('data-method');
            addLog(`[*] Method changed to ${selectedMethod}`);
        };
    });
    if (threadsSlider && threadsValue) {
        threadsSlider.oninput = () => { threadsValue.innerText = threadsSlider.value; };
    }
    if (durationSlider) {
        durationSlider.oninput = () => { durationSeconds = parseInt(durationSlider.value); };
    }
    
    const waVideoElem = document.getElementById('waVideo');
    if (waVideoElem) {
        waVideoElem.onerror = function() { 
            this.style.display = 'none'; 
            const banner = this.closest('.banner-video');
            if (banner) banner.style.background = 'linear-gradient(135deg, #1e3a8a, #3b82f6)';
        };
    }
    
    setInterval(refreshIcons, 200);
})();
</script>
</body>
</html>
