            </div>
            <div class="profile-info-item-page">
                <span class="profile-info-label-page">Password</span>
                <span class="profile-info-value-page" id="profilePasswordDisplay">***********</span>
            </div>
            <div class="profile-info-item-page">
                <span class="profile-info-label-page">Role</span>
                <span class="profile-info-value-page" id="profileRoleValueDisplay">MEMBER</span>
            </div>
            <div class="profile-info-item-page">
                <span class="profile-info-label-page">Expired</span>
                <span class="profile-info-value-page" id="profileExpiryDisplay">2028-12-25</span>
            </div>
            <div class="profile-info-item-page">
                <span class="profile-info-label-page">Session Key</span>
                <span class="profile-info-value-page">cc483459...</span>
