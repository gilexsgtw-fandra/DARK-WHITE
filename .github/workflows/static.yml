<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GHOST TERMINAL</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0b1e;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            overflow-y: auto;
        }
        body::-webkit-scrollbar { display: none; }

        /* LOGIN PAGE - BACKGROUND BARU */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.postimg.cc/5tRW6LLq/images-(8).jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .login-page::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
        }
        .login-page.hide { opacity: 0; visibility: hidden; }
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: 0 20px;
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(16, 19, 31, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(139, 158, 255, 0.2);
            padding: 32px 28px 40px;
        }
        .avatar-wrapper { display: flex; justify-content: center; margin-bottom: 24px; }
        .avatar-square {
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, #1e2130, #0f111a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(139, 158, 255, 0.5);
        }
        .avatar-square img { width: 100%; height: 100%; object-fit: cover; }
        .welcome { text-align: center; margin-bottom: 28px; }
        .welcome h2 { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #fff, #a0a0c0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .welcome p { font-size: 13px; color: #8f9eff; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: #8b9eff; margin-bottom: 8px; }
        .input-wrapper {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(42, 47, 71, 0.8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 14px 18px;
        }
        .input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-size: 15px;
            outline: none;
        }
        .char-counter {
            text-align: right;
            font-size: 10px;
            color: #6e7390;
            margin-top: 4px;
        }
        .char-counter.valid { color: #4ade80; }
        .char-counter.invalid { color: #ef4444; }
        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #5f7ef2, #3b56c4);
            border: none;
            border-radius: 12px;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .login-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .buy-link { text-align: center; margin-top: 16px; }
        .buy-link a { color: #8f9eff; font-size: 13px; text-decoration: none; }

        /* SPLASH SCREEN */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0c12;
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .splash-screen.show { opacity: 1; visibility: visible; }
        .splash-screen.glitch-exit {
            animation: glitchFlash 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes glitchFlash {
            0% { opacity: 1; transform: scale(1); filter: blur(0px);}
            20% { opacity: 1; transform: scale(1.03); filter: blur(3px); background: #ff00ff20;}
            40% { opacity: 1; transform: scale(0.97); filter: blur(1px); background: #00ffff20;}
            60% { opacity: 1; transform: scale(1.01); filter: blur(0px);}
            100% { opacity: 0; transform: scale(0.95); filter: blur(0px); visibility: hidden;}
        }
        .loader-wrapper {
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }
        .banner-box {
            width: 100%;
            height: 220px;
            background: #2a2f3e;
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(139, 158, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            margin-bottom: 25px;
        }
        .banner-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .mute-toggle {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        .info-text h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(59,130,246,0.5);
        }
        .info-text h1 span { color: #3b82f6; }
        .info-text p {
            font-size: 11px;
            color: #8b9eff;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }
        .skip-btn {
            background: rgba(30, 41, 59, 0.9);
            color: #8b9eff;
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 14px 35px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .skip-btn:hover {
            background: #3b82f6;
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* MAIN APP */
        .app-wrapper { display: none; opacity: 0; transition: opacity 0.5s; }
        .app-wrapper.show { display: block; opacity: 1; }
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; background: #0a0b1e; min-height: 100vh; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #0a0b1e;
            border-bottom: 1px solid #1e293b;
        }
        .brand-name {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, #8b9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #0a0b1e;
            z-index: 1000;
            transition: 0.3s;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar-header {
            background: linear-gradient(to right, #1e40af, #3b82f6);
            padding: 40px 20px 20px;
        }
        .sidebar-header h2 { margin: 0; font-size: 1.5rem; color: white; }
        .sidebar-user-info p { margin: 5px 0; font-size: 0.9rem; color: #cbd5e1; }
        .sidebar-menu { padding: 20px; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            color: white;
            gap: 15px;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        .container { padding: 15px; padding-bottom: 80px; }
        .page { display: none; }
        .page.active-page { display: block; }

        /* ========= HOME PAGE - DARKVERSE STYLE ========= */
        .darkverse-home {
            padding: 10px 0;
        }
        .darkverse-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .darkverse-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #8b9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .darkverse-subtitle {
            font-size: 11px;
            color: #6e7390;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Banner Gambar Persegi Panjang */
        .banner-image-card {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 16 / 5;
            background-color: #1e293b;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .banner-image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Action Card dengan Background Gambar */
        .action-card {
            background: #0f1222;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid #252c3e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .action-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(10, 11, 30, 0.6);
            border-radius: 20px;
            z-index: 0;
        }
        .action-card > * {
            position: relative;
            z-index: 1;
        }
        .action-card:hover {
            border-color: #3b82f6;
            transform: scale(1.01);
        }
        .action-card:hover::before {
            background: rgba(10, 11, 30, 0.5);
        }
        .action-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .action-icon {
            width: 48px;
            height: 48px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon.buy {
            background: rgba(249, 115, 22, 0.1);
        }
        .action-text h4 {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }
        .action-text p {
            font-size: 11px;
            color: #8b9eff;
        }
        .action-arrow {
            color: #8b9eff;
        }

        /* WHATSAPP PAGE */
        .profile-card {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .avatar img { width: 100%; }
        .badge {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        .banner-video {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
            aspect-ratio: 16/9;
        }
        .banner-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .banner-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 2;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .control-panel {
            background: #161b33;
            border-radius: 15px;
            padding: 20px;
        }
        .input-wrapper-cp {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 12px;
        }
        input, select {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            padding-left: 10px;
            font-size: 14px;
        }
        .btn-send {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* INFO PAGE */
        .rules-container {
            background: #161b33;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #252c3e;
            margin-bottom: 20px;
        }
        .rules-title {
            font-size: 20px; font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .rule-item { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #1e293b; }
        .rule-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .rule-number { background: rgba(239,68,68,0.2); color: #ef4444; font-weight: 700; font-size: 14px; padding: 2px 10px; border-radius: 20px; }
        .rule-title { font-weight: 700; font-size: 16px; color: #f0f0ff; }
        .rule-desc { color: #cbd5e1; font-size: 13px; margin-left: 28px; }
        .penalty-box { background: rgba(239,68,68,0.1); border-left: 3px solid #ef4444; padding: 12px 16px; margin-top: 16px; border-radius: 12px; }
        .disclaimer { background: #0f1220; border-radius: 20px; padding: 16px; text-align: center; font-size: 11px; color: #8b9eff; margin-top: 16px; }

        /* TOOLS PAGE */
        .ddos-container { max-width: 500px; margin: 0 auto; padding: 20px 16px 100px; }
        .ddos-header { text-align: center; margin-bottom: 30px; }
        .ddos-header .ddos-logo { width: 70px; height: 70px; background: linear-gradient(135deg, #dc2626, #b91c1c); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .ddos-header h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #ef4444, #dc2626); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .ddos-header p { font-size: 12px; color: #94a3b8; }
        .ddos-card { background: #0f1222; border-radius: 24px; border: 1px solid #252c3e; overflow: hidden; margin-bottom: 20px; }
        .ddos-card-header { padding: 18px 20px; border-bottom: 1px solid #1e293b; }
        .ddos-card-header h2 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #ef4444; }
        .ddos-card-body { padding: 20px; }
        .method-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .method-badge { background: #1a1e30; padding: 6px 14px; border-radius: 30px; font-size: 12px; cursor: pointer; }
        .method-badge.active { background: #dc2626; color: white; }
        .slider-group { margin-bottom: 20px; }
        .slider-group label { display: block; font-size: 12px; color: #8b9eff; margin-bottom: 8px; }
        input[type="range"] { width: 100%; height: 4px; -webkit-appearance: none; background: #2a2f47; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #ef4444; border-radius: 50%; cursor: pointer; }
        .btn-attack { width: 100%; background: linear-gradient(95deg, #dc2626, #b91c1c); border: none; padding: 14px; border-radius: 40px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-stop { width: 100%; background: #2a2f47; border: 1px solid #3a4058; padding: 12px; border-radius: 40px; color: #94a3b8; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-box { background: #0a0c15; border-radius: 16px; padding: 16px; margin-top: 20px; text-align: center; border: 1px solid #2a2f47; }
        .status-value.idle { color: #4ade80; }
        .status-value.attacking { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .stat-card { background: #0a0c15; border-radius: 16px; padding: 12px; text-align: center; border: 1px solid #2a2f47; }
        .stat-card .stat-number { font-size: 22px; font-weight: 700; color: #ef4444; }
        .ddos-log { font-size: 11px; color: #94a3b8; max-height: 150px; overflow-y: auto; font-family: monospace; }

        /* SENDER NODES MODAL */
        .modal-sender {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-sender.show { display: flex; }
        .modal-sender .modal-card {
            background: #0f1222;
            border-radius: 32px;
            border: 1px solid #252c3e;
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .modal-sender .modal-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid #1e293b;
            position: relative;
        }
        .modal-sender .modal-header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #8b9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .modal-sender .modal-header .sub {
            font-size: 12px;
            color: #6e7390;
            margin-top: 6px;
            text-align: center;
        }
        .btn-back-sender {
            position: absolute;
            top: 24px;
            left: 24px;
            background: rgba(139, 158, 255, 0.1);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8b9eff;
        }
        .modal-sender .modal-body { padding: 24px; }
        .empty-state-sender { text-align: center; padding: 32px 20px; }
        .empty-icon {
            width: 70px;
            height: 70px;
            background: #1a1e30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .empty-state-sender h3 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 10px; }
        .empty-state-sender p { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
        .btn-initialize {
            background: linear-gradient(95deg, #2a2f47, #1e2338);
            border: 1px solid #3a4058;
            padding: 12px 28px;
            border-radius: 40px;
            color: #8b9eff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .form-title { font-size: 18px; font-weight: 700; color: white; margin-bottom: 20px; }
        .btn-cancel-sender {
            flex: 1;
            background: transparent;
            border: 1px solid #3a4058;
            padding: 14px;
            border-radius: 40px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-generate {
            flex: 1;
            background: linear-gradient(95deg, #3b82f6, #2563eb);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-primary-sender {
            width: 100%;
            background: linear-gradient(95deg, #3b82f6, #2563eb);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        .pairing-code {
            background: #0a0c15;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #2a2f47;
            text-align: center;
        }
        .code-box {
            background: #0f111a;
            padding: 16px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #4ade80;
            margin-bottom: 16px;
            border: 1px solid #2a2f47;
        }
        .btn-copy {
            background: #1e2338;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
