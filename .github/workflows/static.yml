                <p style="font-size: 12px; color: #94a3b8; margin-bottom: 20px;">Masukkan nomor WhatsApp target yang ingin dihubungkan sebagai Sender Node.</p>
                <div class="input-group-sender">
                    <label>PHONE NUMBER</label>
                    <div class="input-wrapper-sender">
                        <input type="tel" id="phoneNumberSender" placeholder="+62xxxxxxxxxx">
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-cancel-sender" id="cancelSenderBtn">CANCEL</button>
                    <button class="btn-generate" id="generatePairingBtn">GENERATE PAIRING</button>
                </div>
            </div>

            <div id="pairingStateSender" class="hidden">
                <div class="form-title">PAIRING CODE</div>
                <div class="pairing-code">
                    <p>🔐 Kode pairing untuk menghubungkan device:</p>
                    <div class="code-box" id="codeDisplaySender">XXXXXX</div>
                    <button class="btn-copy" id="copyCodeSenderBtn">📋 COPY CODE</button>
                </div>
                <button class="btn-primary-sender" id="finishPairingSenderBtn">INITIALIZE SENDER</button>
            </div>

            <div id="nodesStateSender" class="hidden">
                <div class="node-list" id="nodeListContainer"></div>
                <button class="btn-primary-sender" id="addNewNodeSenderBtn">+ ADD NEW SENDER</button>
            </div>
        </div>
    </div>
</div>

<!-- PROFILE PAGE MODAL -->
<div class="profile-page-modal" id="profilePageModal">
    <div class="profile-card-page">
        <div class="profile-header">
            <button class="btn-back-profile" id="backProfileBtn">
                <i data-lucide="arrow-left" size="20"></i>
            </button>
