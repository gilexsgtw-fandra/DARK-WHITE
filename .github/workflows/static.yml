            <p>Account information & settings</p>
        </div>
        <div class="profile-avatar-page">
            <div class="profile-avatar-circle-page">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#8b9eff" stroke-width="1.5">
                    <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="none" stroke="#8b9eff"/>
                </svg>
